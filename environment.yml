name: p53-regulatory-network
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Base & Editor Support
  - python=3.10
  - r-base=4.3
  - r-languageserver
  - ipykernel
  - jupyter
  - requests
  - tqdm
  - pytest
  - biopython

  # ChIP/RNA-seq
  - fastqc
  - trim-galore
  - bowtie2
  - star
  - samtools
  - bedtools
  - macs2
  - multiqc
  - meme

  # Data/ML
  - pandas
  - numpy
  - scipy
  - pysam
  - pybedtools
  - deeptools
  - networkx
  - scikit-learn
  - xgboost
  - shap
  - matplotlib
  - seaborn

  # R — Bioconductor
  - bioconductor-chipseeker
  - bioconductor-deseq2
  - bioconductor-clusterprofiler
  - bioconductor-txdb.hsapiens.ucsc.hg38.knowngene
  - bioconductor-org.hs.eg.db
  - bioconductor-genomicranges
  - bioconductor-rtracklayer
  - bioconductor-complexheatmap
  - bioconductor-tcgabiolinks

  # R — CRAN
  - r-survminer
  - r-ggvenndiagram
