name: p53-regulatory-network
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Base
  - python=3.10
  - r-base=4.3
  - requests
  - tqdm
  - pytest
  
  # ChIP/RNA-seq
  - fastqc
  - trim-galore
  - bowtie2
  - star
  - samtools
  - macs2
  - multiqc
  - meme
  
  # Data/ML
  - pandas
  - numpy
  - scipy
  - pybedtools
  - deeptools
  - networkx
  - scikit-learn
  - xgboost
  - shap
  - matplotlib
  - seaborn