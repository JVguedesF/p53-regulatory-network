paths:
  raw: data/raw
  tsv: data/tsv
  genome: data/genome
  pipeline_outputs: pipeline_outputs
  results: results
  logs: logs

genome:
  target: hg38
  release: current
  fasta: data/genome/fasta/hg38.fa
  cdna_fasta: data/genome/fasta/Homo_sapiens.GRCh38.cdna.all.fa.gz
  bowtie2_index: data/genome/index/bowtie2/genome_index_hg38
  salmon_index: data/genome/index/salmon/salmon_index_hg38

resources:
  threads: 4
  max_jobs: 2

trimming:
  quality: 20

analysis:
  promoter_window: 3000
  macs2_qvalue: 0.05
  deseq2_lfc_threshold: 1.0
  deseq2_padj_threshold: 0.05
  cancer_type: TCGA-LUAD

integration:
  pairs_file: config/integration_pairs.csv

downloads:
  PRJNA203360:
    description: "p53 ChIP-seq MCF7 treated with Nutlin-3a"
    condition_name: "MCF7_Nutlin_p53"
    overrides:
      SRR856298: "Input"
      SRR856299: "Input"
      SRR866627: "IP"
    replicates:
      SRR856298: 1
      SRR856299: 2
      SRR866627: 1

  PRJNA203359:
    description: "RNA-seq MCF7 control vs Nutlin-3a"
    condition_name: "MCF7"
    conditions:
      SRR867127: "MCF7_control"
      SRR867128: "MCF7_control"
      SRR867129: "MCF7_nutlin"
      SRR867130: "MCF7_nutlin"
    replicates:
      SRR867127: 1
      SRR867128: 2
      SRR867129: 1
      SRR867130: 2

  ENCSR000DWJ:
    description: "H3K4me3 ChIP-seq MCF7"
    condition_name: "MCF7_H3K4me3"
    overrides: {}

  ENCSR000EWR:
    description: "H3K27ac ChIP-seq MCF7"
    condition_name: "MCF7_H3K27ac"
    overrides: {}
